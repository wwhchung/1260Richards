// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakToggle({ label, value, onChange }) {

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

// Open-house helpers -----------------------------------------------------
// All open house times are wall-clock Vancouver (Pacific). Translate the
// visitor's current moment into Vancouver time before comparing, so today /
// tomorrow / past labels are correct regardless of the visitor's timezone,
// and so DST is handled by Intl (no hardcoded offset).
const OH_TZ = "America/Vancouver";

function _vanParts(d) {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: OH_TZ,
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false,
  }).formatToParts(d || new Date());
  const out = {};
  for (const p of parts) if (p.type !== "literal") out[p.type] = p.value;
  if (out.hour === "24") out.hour = "00"; // Safari midnight quirk
  return out;
}
function vancouverDateStr(d) {
  const { year, month, day } = _vanParts(d);
  return `${year}-${month}-${day}`;
}
function vancouverISO(d) {
  const p = _vanParts(d);
  return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`;
}
function addDaysISO(iso, n) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().slice(0, 10);
}

// Returns: "past" | "in-progress" | "today" | "tomorrow" | "upcoming"
function ohStatus(oh, refDate) {
  const now   = refDate || new Date();
  const nowVan = vancouverISO(now);
  const today  = vancouverDateStr(now);
  const start  = `${oh.date}T${oh.start}:00`;
  const end    = `${oh.date}T${oh.end}:00`;
  if (nowVan >= end)                    return "past";
  if (nowVan >= start)                  return "in-progress";
  if (oh.date === today)                return "today";
  if (oh.date === addDaysISO(today, 1)) return "tomorrow";
  return "upcoming";
}

// Past entries drop off the list entirely (3 → 2 → 1 → 0).
function upcomingOpenHouses(list) {
  return (list || []).filter(oh => ohStatus(oh) !== "past");
}

function fmtOpenHouseDate(iso, opts) {
  const o = opts || { weekday: "long", month: "long", day: "numeric", year: "numeric" };
  return new Date(iso + "T00:00").toLocaleDateString("en-CA", o);
}
function fmtOpenHouseDateShort(iso) {
  return fmtOpenHouseDate(iso, { weekday: "short", month: "short", day: "numeric" });
}
function fmtOpenHouseTime(t24) {
  const [h, m] = t24.split(":").map(Number);
  const period = h >= 12 ? "pm" : "am";
  const h12 = ((h + 11) % 12) + 1;
  return m === 0 ? `${h12} ${period}` : `${h12}:${String(m).padStart(2,"0")} ${period}`;
}
function fmtOpenHouseRange(oh) {
  return `${fmtOpenHouseTime(oh.start)} – ${fmtOpenHouseTime(oh.end)}`;
}
function ohStatusLabel(status) {
  return {
    "past":        "Past",
    "in-progress": "Happening now",
    "today":       "Today",
    "tomorrow":    "Tomorrow",
    "upcoming":    "Drop-in welcome",
  }[status] || "Drop-in welcome";
}

// Row-by-row layout planner. Every emitted "row" sums to 12 columns and contains
// tiles whose aspect-ratios produce nearly-equal pixel heights, so rows align
// cleanly on wide view. Tile aspect-ratio always tracks the photo's native AR,
// so the image fills the tile without object-fit cropping.
//
// Spans paired by AR group:
//   • Hero               → [12]            (first photo of the set)
//   • Wide ≥ 16:9        → [12]            (full-row feature for very wide)
//   • Portrait + L       → [4P, 8L]        (4/0.667 ≈ 6col tall ; 8/1.5 ≈ 5.3col)
//   • L + portrait       → [8L, 4P]        (mirror of above)
//   • Three landscapes   → [4, 4, 4]       (every Nth landscape row, for variety)
//   • Two landscapes     → [6, 6]          (default landscape pair)
//   • Lone landscape     → [12]            (trailing item, no pair available)
function layoutPhotos(photos) {
  const ar = (p) => p && p.ar ? p.ar : 1.5;
  const isLandscape = (a) => a >= 1.3 && a <= 1.85;
  const isPortrait  = (a) => a < 0.9;
  const isWideHero  = (a) => a > 1.85;

  const out = [];
  let i = 0;
  let landscapeRowsSeen = 0;
  while (i < photos.length) {
    const p = photos[i];
    const a = ar(p);
    // (1) Hero on the very first tile
    if (out.length === 0) { out.push({ s: 12, r: a }); i++; continue; }
    // (2) Wide-than-16:9 photos get their own full row
    if (isWideHero(a))    { out.push({ s: 12, r: a }); i++; continue; }
    // (3) Portrait
    if (isPortrait(a)) {
      const next = photos[i + 1];
      if (next && isLandscape(ar(next))) {
        out.push({ s: 4, r: a });
        out.push({ s: 8, r: ar(next) });
        i += 2; continue;
      }
      out.push({ s: 12, r: a }); i++; continue;
    }
    // (4) Landscape — choose pattern based on lookahead
    const next  = photos[i + 1];
    const next2 = photos[i + 2];
    // 4a) Landscape followed by portrait → 8L + 4P spread
    if (next && isPortrait(ar(next))) {
      out.push({ s: 8, r: a });
      out.push({ s: 4, r: ar(next) });
      i += 2; continue;
    }
    // 4b) Every 3rd landscape row — 4+4+4 triplet if 3 landscapes are queued
    const tripletReady = next && next2 && isLandscape(ar(next)) && isLandscape(ar(next2));
    if (tripletReady && landscapeRowsSeen % 3 === 2) {
      out.push({ s: 4, r: a });
      out.push({ s: 4, r: ar(next) });
      out.push({ s: 4, r: ar(next2) });
      i += 3; landscapeRowsSeen++; continue;
    }
    // 4c) Default 6+6 landscape pair
    if (next && isLandscape(ar(next))) {
      out.push({ s: 6, r: a });
      out.push({ s: 6, r: ar(next) });
      i += 2; landscapeRowsSeen++; continue;
    }
    // 4d) Lone trailing landscape — full row
    out.push({ s: 12, r: a }); i++;
  }
  return out;
}

const { useState: useStateS, useEffect: useEffectS, useRef: useRefS } = React;

// ---- LazyBg: IntersectionObserver-based background-image loader ---------
function LazyBg({ src, position = "center 60%", eager = false, className = "", style = {}, children, ...rest }) {
  const ref = useRefS(null);
  const [loaded, setLoaded] = useStateS(eager);
  useEffectS(() => {
    if (loaded || !ref.current) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setLoaded(true); obs.disconnect(); }
    }, { rootMargin: "300px" });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [loaded]);
  return (
    <div
      ref={ref}
      className={className}
      style={{
        ...style,
        backgroundImage: loaded ? `url(${src})` : "none",
        backgroundSize: "cover",
        backgroundPosition: position,
        backgroundColor: "var(--paper-2)",
        transition: "opacity .5s ease",
        opacity: loaded ? 1 : 0.001,
      }}
      {...rest}
    >
      {children}
    </div>
  );
}

// ---- HeroVideo: muted autoplay loop layered over the hero photo ---------
function HeroVideo() {
  const ref = useRefS(null);
  const reduceMotion = typeof window !== "undefined"
    && window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  useEffectS(() => {
    if (!ref.current) return;
    const p = ref.current.play();
    if (p && typeof p.catch === "function") p.catch(() => { /* iOS Low Power, etc. — poster carries it */ });
  }, []);
  if (reduceMotion) return null;
  return (
    <video
      ref={ref}
      autoPlay
      muted
      loop
      playsInline
      preload="metadata"
      poster="https://1260richards.com/videos/hero-poster.jpg"
      aria-hidden="true"
      style={{
        position: "absolute", inset: 0,
        width: "100%", height: "100%",
        objectFit: "cover",
        pointerEvents: "none",
      }}
    >
      <source src="https://1260richards.com/videos/hero-loop.webm" type="video/webm" />
      <source src="https://1260richards.com/videos/hero-loop.mp4"  type="video/mp4"  />
    </video>
  );
}

// ---- Sticky nav ---------------------------------------------------------
function Nav({ onInquire }) {
  const [scrolled, setScrolled] = useStateS(false);
  const [open, setOpen] = useStateS(false);
  useEffectS(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  useEffectS(() => {
    document.body.style.overflow = open ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  }, [open]);
  const sections = [
    ["The Address", "address"],
    ["The Rare Details", "rare"],
    ["Open Houses", "open-houses"],
    ["Tour", "gallery"],
    ["The Home", "home"],
    ["Neighbourhood", "hood"],
    ["Inquire", "inquire"],
  ];
  const navColor = (scrolled || open) ? "var(--ink)" : "var(--paper)";
  return (
    <>
      <nav style={{
        position: "fixed", top: 0, left: 0, right: 0, zIndex: 80,
        padding: scrolled ? "14px 0" : "22px 0",
        background: (scrolled || open) ? "rgba(244,240,232,.94)" : "transparent",
        backdropFilter: (scrolled || open) ? "blur(14px)" : "none",
        WebkitBackdropFilter: (scrolled || open) ? "blur(14px)" : "none",
        borderBottom: scrolled ? "1px solid var(--line-soft)" : "1px solid transparent",
        transition: "all .3s ease",
        color: navColor,
      }}>
        <div className="container flex items-center justify-between">
          <a href="#top" onClick={() => setOpen(false)} style={{
            textDecoration: "none", color: "inherit",
            fontFamily: "var(--serif)", fontSize: 22, letterSpacing: "-.01em",
          }}>
            1260 <em style={{ fontStyle: "italic", opacity: .7 }}>Richards</em>
          </a>
          <div className="hidden md:flex items-center gap-8">
            {sections.map(([label, id]) => (
              <a key={id} href={`#${id}`}
                onClick={(e) => { if (id === "inquire") { e.preventDefault(); onInquire(); } }}
                style={{
                  color: "inherit", textDecoration: "none",

                  fontWeight: 500, opacity: .85,
                }}>{label}</a>
            ))}
          </div>
          <button
            aria-label={open ? "Close menu" : "Open menu"}

            style={{
              background: "transparent", border: 0, color: "inherit",

            }}>
            <span style={{ position: "relative", width: 22, height: 14, display: "block" }}>
              <span style={{ position: "absolute", left: 0, right: 0, height: 1, background: "currentColor", top: open ? 6 : 0, transform: open ? "rotate(45deg)" : "none", transition: "all .25s ease" }} />
              <span style={{ position: "absolute", left: 0, right: 0, height: 1, background: "currentColor", top: 6, opacity: open ? 0 : 1, transition: "opacity .15s ease" }} />
              <span style={{ position: "absolute", left: 0, right: 0, height: 1, background: "currentColor", top: open ? 6 : 13, transform: open ? "rotate(-45deg)" : "none", transition: "all .25s ease" }} />

          </button>
        </div>
      </nav>
      {/* Mobile sheet */}
      <div
        className="md:hidden"
        style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,

}/*EDITMODE-END*/;

const PALETTES = {
  ivory:    { ink: "#1A1714", ink2: "#3A332D", ink3: "#6B6157", paper: "#F4F0E8", paper2: "#EAE4D8", paper3: "#DED6C5" },
  noir:     { ink: "#F0EBE0", ink2: "#C9C3B6", ink3: "#8F887B", paper: "#161310", paper2: "#1F1B17", paper3: "#28231D" },
  bone:     { ink: "#2B2825", ink2: "#544F48", ink3: "#86807A", paper: "#FBF9F4", paper2: "#F2EFE8", paper3: "#E6E1D6" },
  slate:    { ink: "#15171A", ink2: "#3A3F46", ink3: "#6A7079", paper: "#ECEEF1", paper2: "#E0E3E7", paper3: "#D3D7DC" },
};

const ACCENTS = {
  sandstone: { c: "oklch(0.62 0.07 50)", deep: "oklch(0.48 0.07 45)", label: "Sandstone" },
  forest:    { c: "oklch(0.50 0.06 145)", deep: "oklch(0.38 0.06 145)", label: "Forest" },
  oxblood:   { c: "oklch(0.45 0.10 25)", deep: "oklch(0.34 0.10 22)", label: "Oxblood" },
  ink:       { c: "oklch(0.30 0.04 250)", deep: "oklch(0.20 0.04 250)", label: "Ink Blue" },
};

function applyTheme(t) {
  const p = PALETTES[t.palette] || PALETTES.ivory;
  const a = ACCENTS[t.accent] || ACCENTS.sandstone;
  const r = document.documentElement.style;
  r.setProperty("--ink", p.ink);
  r.setProperty("--ink-2", p.ink2);
  r.setProperty("--ink-3", p.ink3);
  r.setProperty("--paper", p.paper);
  r.setProperty("--paper-2", p.paper2);
  r.setProperty("--paper-3", p.paper3);
  r.setProperty("--accent", a.c);
  r.setProperty("--accent-deep", a.deep);
  // Lines need to be derived from paper/ink — use ink rgb if possible
  r.setProperty("--line", (p.ink.startsWith("#1") || p.ink.startsWith("#2")) ? "rgba(26,23,20,0.16)" : "rgba(240,235,224,0.18)");
  r.setProperty("--line-soft", (p.ink.startsWith("#1") || p.ink.startsWith("#2")) ? "rgba(26,23,20,0.08)" : "rgba(240,235,224,0.09)");
  document.body.style.background = p.paper;
  document.body.style.color = p.ink;
  // Fonts
  if (t.displayFont) {
    r.setProperty("--serif", `"${t.displayFont}", "Times New Roman", serif`);
  }
  if (t.bodyFont) {
    r.setProperty("--sans", `"${t.bodyFont}", -apple-system, "Helvetica Neue", sans-serif`);
  }
}

function loadFont(family) {
  if (!family) return;
  const id = "font-" + family.replace(/\s+/g, "-");
  if (document.getElementById(id)) return;
  const link = document.createElement("link");
  link.id = id;
  link.rel = "stylesheet";
  link.href = `https://fonts.googleapis.com/css2?family=${family.replace(/\s+/g, "+")}:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap`;
  document.head.appendChild(link);
}

            label="Display"
            value={t.displayFont}
            onChange={v => setTweak("displayFont", v)}
            options={[
              "Cormorant Garamond","Playfair Display","EB Garamond","Marcellus","Libre Caslon Display","Italiana","DM Serif Display"
            ]}
          />
          <TweakSelect
            label="Body"
            value={t.bodyFont}
            onChange={v => setTweak("bodyFont", v)}
            options={["Inter Tight","Manrope","Work Sans","DM Sans","Outfit","Hanken Grotesk"]}
          />
        </TweakSection>

        <TweakSection label="Hero">
          <TweakSelect
            label="Photograph"
            value={t.heroPhoto}
            onChange={v => setTweak("heroPhoto", v)}
            options={heroOptions}
          />
        </TweakSection>

        <TweakSection label="Sections">
          <TweakToggle label="Rare details" value={t.showRarity} onChange={v => setTweak("showRarity", v)} />
          <TweakToggle label="Floor plan" value={t.showFloorPlan} onChange={v => setTweak("showFloorPlan", v)} />
          <TweakToggle label="Neighbourhood" value={t.showNeighbourhood} onChange={v => setTweak("showNeighbourhood", v)} />
          <TweakToggle label="The building" value={t.showBuilding} onChange={v => setTweak("showBuilding", v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
